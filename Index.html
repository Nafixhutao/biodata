<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bipedal Parkour: Ledge Climbing</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; background-color: #030303; color: #ededed; font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border-radius: 8px; box-shadow: 0 0 50px rgba(0, 112, 243, 0.1); border: 1px solid #222; }
    </style>
</head>
<body>

<script>
    // --- SKALA: 100 pixel = 1 Meter ---
    const L1 = 110, L2 = 120, FOOT_LEN = 30; // Kaki (Total ~2.3m)
    const ARM1 = 70, ARM2 = 65;              // Lengan
    
    // --- STATE MACHINE ---
    let state = 'WALK'; // WALK, FALL, CLIMB, DEAD
    let t = 0, speed = 0.05, terrainOffset = 0;
    
    // --- TERRAIN GENERATOR ---
    let mapSegments = [];
    let currentX = -500;
    
    // Generate Jurang yang makin melebar (0.5m, 1.0m, 1.5m, 2.0m, 2.5m...)
    function generateMap() {
        for(let i=0; i<10; i++) {
            mapSegments.push({ type: 'ground', start: currentX, length: 400 });
            currentX += 400;
            let gapWidth = (i + 1) * 50; // 50px = 0.5m
            mapSegments.push({ type: 'gap', start: currentX, length: gapWidth, widthMeter: gapWidth/100 });
            currentX += gapWidth;
        }
    }

    // --- CLIMBING KINEMATICS ---
    let climbPhase = 0;
    let targetLedge = {x: 0, y: 0};
    let grabPoint = {x: 0, y: 0};
    let wallFootHold = {x: 0, y: 0};
    let preClimbHip = {x: 0, y: 0};
    
    // --- FALLING PHYSICS ---
    let fallVelocity = 0, deadHipY = 0, deadTorsoAngle = 0;

    function setup() {
        createCanvas(1100, 650);
        textAlign(LEFT, TOP);
        generateMap();
    }

    function getTerrainAt(x) {
        for (let seg of mapSegments) {
            if (x >= seg.start && x < seg.start + seg.length) {
                return seg.type === 'ground' ? 0 : 500; // 0 = tanah datar, 500 = dasar jurang
            }
        }
        return 0; // Default flat
    }

    // Mencari kordinat bibir tebing terdekat di depan robot
    function getNextLedge(currentX) {
        for (let seg of mapSegments) {
            if (seg.type === 'gap' && currentX > seg.start - 100 && currentX < seg.start + seg.length) {
                return { x: seg.start + seg.length, y: 0 };
            }
        }
        return null;
    }

    function draw() {
        background('#06070a'); 

        // ENVIRONMENT SCROLLING
        if (state === 'WALK') {
            t += speed;
            terrainOffset += speed * 150;
        }

        let pL = t % 1;
        let pR = (t + 0.5) % 1.0;

        push();
        translate(width / 2 - 100, height / 2 + 100);

        // 1. RENDER TERRAIN
        stroke('#333'); strokeWeight(4); noFill();
        beginShape();
        let drawX = -width;
        let lastY = 0;
        for (let x = -width; x < width * 2; x += 10) {
            let y = getTerrainAt(x + terrainOffset);
            if (y !== lastY) { // Buat garis vertikal (tebing)
                vertex(x, lastY); vertex(x, y);
            }
            vertex(x, y);
            lastY = y;
        }
        endShape();

        // 2. KINEMATIKA DASAR
        let hipX = 0, hipY = 0, torsoAngle = 0;
        let footL = createVector(0,0), footR = createVector(0,0);
        let armTargetL = null, armTargetR = null;

        let globalHipX = terrainOffset; // Titik sumbu robot

        // --- STATE LOGIC EVALUATION ---
        if (state === 'WALK') {
            let groundY = getTerrainAt(globalHipX);
            hipY = groundY - (L1 + L2) + 15 + (10 * Math.cos(t * Math.PI * 4));
            
            // Hitung ayunan kaki
            footL = calculateWalkTrajectory(pL, globalHipX);
            footR = calculateWalkTrajectory(pR, globalHipX);

            // Deteksi Jatuh: Jika kedua kaki tidak memijak tanah (Y kaki > pinggul)
            if (getTerrainAt(globalHipX) > 200 && hipY > -50) {
                let ledge = getNextLedge(globalHipX);
                // Jika tebing berikutnya dalam jangkauan lengan/kaki (sekitar 200px atau 2 meter)
                if (ledge && (ledge.x - globalHipX) < 220) {
                    state = 'CLIMB';
                    climbPhase = 0;
                    targetLedge = ledge;
                    preClimbHip = { x: hipX, y: hipY };
                } else {
                    state = 'FALL';
                    fallVelocity = -2; // Pantulan kecil sebelum jatuh
                    deadHipY = hipY;
                }
            }
        } 
        else if (state === 'CLIMB') {
            // Ledge pos relatif ke layar
            let relLedgeX = targetLedge.x - terrainOffset;
            let relLedgeY = targetLedge.y;

            climbPhase += 0.015; // Kecepatan memanjat
            
            // --- PROCEDURAL PULL-UP ANIMATION ---
            if (climbPhase < 0.3) {
                // Fase 1: Menggantung. Lengan mencengkeram tebing, kaki mencari dinding vertikal
                hipX = lerp(preClimbHip.x, relLedgeX - 60, climbPhase / 0.3);
                hipY = lerp(preClimbHip.y, relLedgeY + 120, climbPhase / 0.3);
                torsoAngle = 0.2; // Condong ke dinding
                
                // IK Target
                armTargetR = createVector(relLedgeX + 10, relLedgeY); // Mencengkeram ujung atas
                footR = createVector(relLedgeX - 5, relLedgeY + 180); // Kaki kanan menginjak dinding bawah
                footL = createVector(hipX - 20, hipY + 100); // Kaki kiri menggantung bebas
            } 
            else if (climbPhase < 0.7) {
                // Fase 2: Hoist (Mengangkat badan ke atas)
                let p = (climbPhase - 0.3) / 0.4;
                hipX = relLedgeX - 60 + (p * 40);
                hipY = lerp(relLedgeY + 120, relLedgeY - (L1 + L2) + 20, p);
                torsoAngle = lerp(0.2, 0.5, p); // Badan sangat condong ke depan
                
                armTargetR = createVector(relLedgeX + 10, relLedgeY);
                footR = createVector(relLedgeX - 5, relLedgeY + 180); 
                
                // Kaki kiri diangkat bersiap memijak lantai atas
                footL = createVector(relLedgeX - 20, lerp(hipY + 100, relLedgeY - 20, p));
            } 
            else if (climbPhase < 1.0) {
                // Fase 3: Recovery (Melangkah di atas tanah baru)
                let p = (climbPhase - 0.7) / 0.3;
                hipX = lerp(relLedgeX - 20, relLedgeX, p);
                hipY = relLedgeY - (L1 + L2) + 20;
                torsoAngle = lerp(0.5, 0, p);
                
                armTargetR = null; // Lepaskan pegangan
                footR = createVector(relLedgeX - 5 + (p*30), relLedgeY); // Kaki kanan naik
                footL = createVector(relLedgeX + 20, relLedgeY); // Kaki kiri sudah menapak kuat
            } 
            else {
                // Berhasil naik! Sinkronisasi offset lingkungan
                terrainOffset = targetLedge.x; 
                state = 'WALK';
            }
        }
        else if (state === 'FALL') {
            fallVelocity += 0.8; // Gravitasi
            deadHipY += fallVelocity;
            deadTorsoAngle -= 0.05; // Tubuh berputar
            
            hipX = 0; hipY = deadHipY; torsoAngle = deadTorsoAngle;
            footL = createVector(hipX - 30, hipY + 180);
            footR = createVector(hipX + 30, hipY + 160);
            
            if (hipY > 600) state = 'DEAD';
        }

        let hip = createVector(hipX, hipY);

        // 3. INVERSE KINEMATICS & RENDERING
        let kneeL = calculateLegIK(hip, footL);
        let kneeR = calculateLegIK(hip, footR);

        drawLeg(hip, kneeR, footR, state==='WALK'? pR : 0, '#3a3a3a', '#222'); 
        drawLeg(hip, kneeL, footL, state==='WALK'? pL : 0, '#0070f3', '#005bb5'); 
        
        drawArticulatedTorso(hip, torsoAngle, state==='WALK'?pL:0, state==='WALK'?pR:0.5, armTargetR);

        pop();

        drawHUD(globalHipX);
    }

    // --- FUNGSI MATEMATIKA LENGAN & KAKI ---

    function calculateWalkTrajectory(phase, globalHipX) {
        let x = 0, y = 0, p = 0;
        let stepLen = 140;

        if (phase < 0.5) {
            p = phase / 0.5; 
            x = lerp(stepLen/2, -stepLen/2, p);
            y = getTerrainAt(globalHipX + x);
        } else {
            p = (phase - 0.5) / 0.5; 
            x = lerp(-stepLen/2, stepLen/2, p);
            y = getTerrainAt(globalHipX + x) - Math.abs(50 * Math.sin(p * Math.PI));
        }
        return createVector(x, y);
    }

    function calculateLegIK(hip, ankle) {
        let dx = ankle.x - hip.x; let dy = ankle.y - hip.y;
        let dist = constrain(Math.sqrt(dx*dx + dy*dy), 0.1, L1 + L2 - 0.1);
        let alpha = Math.acos((L1*L1 + dist*dist - L2*L2) / (2 * L1 * dist));
        let theta = Math.atan2(dy, dx);
        // Lutut menekuk ke depan
        return createVector(hip.x + L1 * Math.cos(theta - alpha), hip.y + L1 * Math.sin(theta - alpha));
    }

    function calculateArmIK(shoulder, target) {
        let dx = target.x - shoulder.x; let dy = target.y - shoulder.y;
        let dist = constrain(Math.sqrt(dx*dx + dy*dy), 0.1, ARM1 + ARM2 - 0.1);
        let alpha = Math.acos((ARM1*ARM1 + dist*dist - ARM2*ARM2) / (2 * ARM1 * dist));
        let theta = Math.atan2(dy, dx);
        // Siku menekuk ke belakang
        let elbowAngle = theta + alpha; 
        return createVector(shoulder.x + ARM1 * Math.cos(elbowAngle), shoulder.y + ARM1 * Math.sin(elbowAngle));
    }

    // --- RENDER VISUAL ---

    function drawLeg(hip, knee, ankle, phase, strokeCol, jointCol) {
        strokeCap(ROUND); strokeJoin(ROUND);
        stroke(strokeCol); strokeWeight(14);
        line(hip.x, hip.y, knee.x, knee.y);
        strokeWeight(10); line(knee.x, knee.y, ankle.x, ankle.y);
        
        strokeWeight(8);
        let toeX = ankle.x + FOOT_LEN, toeY = ankle.y;
        
        // Telapak kaki lurus ke bawah saat memanjat tembok
        if (state === 'CLIMB' && ankle.y > hip.y + 100) {
            toeX = ankle.x; toeY = ankle.y + FOOT_LEN;
        } else if (state === 'WALK' && phase >= 0.5) {
            let p = (phase - 0.5) / 0.5;
            let angle = Math.sin(p * Math.PI) * -0.5; 
            toeX = ankle.x + Math.cos(angle) * FOOT_LEN;
            toeY = ankle.y + Math.sin(angle) * FOOT_LEN;
        }
        line(ankle.x, ankle.y, toeX, toeY);
        noStroke(); fill(jointCol); circle(knee.x, knee.y, 16); circle(ankle.x, ankle.y, 14);
    }

    function drawArticulatedTorso(hip, angle, pL, pR, armTargetR) {
        push();
        translate(hip.x, hip.y);
        rotate(angle);

        // Lengan Kiri (Background)
        drawArmWalk(0, -90, pL, '#444');

        // Tulang punggung
        stroke('#ccc'); strokeWeight(16); line(0, 0, 0, -110);
        
        // Kepala
        fill('#fff'); noStroke(); rect(-15, -135, 30, 20, 6);
        fill(state==='FALL'||state==='DEAD' ? '#ff003c' : (state==='CLIMB' ? '#f5a623' : '#0070f3'));
        circle(10, -125, 6);

        // Dada / Armor
        fill('#1a1a1a'); stroke('#333'); strokeWeight(2);
        rect(-20, -80, 40, 50, 5);

        // Lengan Kanan (Foreground)
        if (armTargetR) {
            // Jika ada target (Memanjat), gunakan IK
            // Lengan keluar dari koordinat lokal bahu (0, -90), sehingga target harus dilokalisasi
            // Ini disederhanakan: kita kembalikan rotasi tubuh, cari posisi asli bahu, baru hitung IK
            pop(); // Kembali ke koordinat global untuk IK lengan
            
            let shoulderGlobal = createVector(
                hip.x + Math.cos(angle - Math.PI/2) * 90, 
                hip.y + Math.sin(angle - Math.PI/2) * 90
            );
            
            let elbow = calculateArmIK(shoulderGlobal, armTargetR);
            
            stroke('#0070f3'); strokeWeight(10);
            line(shoulderGlobal.x, shoulderGlobal.y, elbow.x, elbow.y); // Bahu -> Siku
            strokeWeight(8);
            line(elbow.x, elbow.y, armTargetR.x, armTargetR.y); // Siku -> Tebing (Target)
            noStroke(); fill('#005bb5'); circle(elbow.x, elbow.y, 12);
            
            push(); // Kembalikan stack transformasi
            translate(hip.x, hip.y);
        } else {
            drawArmWalk(0, -90, pR, '#0070f3');
        }

        pop();

        // Pinggul
        fill('#222'); stroke('#444'); strokeWeight(3); circle(hip.x, hip.y, 28);
    }

    function drawArmWalk(shX, shY, phase, col) {
        push(); translate(shX, shY);
        let armSwing = Math.sin(phase * Math.PI * 2) * 1.5;
        rotate(state==='FALL' ? -2.5 : armSwing);
        stroke(col); strokeWeight(10); line(0, 0, 0, ARM1);
        translate(0, ARM1);
        rotate(state==='FALL' ? 0 : -0.5); 
        strokeWeight(8); line(0, 0, 0, ARM2);
        pop();
    }

    function drawHUD(globalX) {
        let textCol = state === 'WALK' ? '#10b981' : (state === 'CLIMB' ? '#f5a623' : '#ff003c');
        
        fill('#0a0a0a99'); stroke('#333'); strokeWeight(1);
        rect(15, 15, 300, 160, 8); 

        fill('#aaa'); noStroke(); textSize(11);
        text('ENVIRONMENT KINEMATICS TERMINAL', 25, 25);
        
        fill(textCol); textSize(12); textStyle(BOLD);
        text(`SYS STATE    : ${state}`, 25, 50);
        
        fill('#ccc'); textStyle(NORMAL);
        let mapIndex = Math.floor(globalX / 400); // Estimasi index terrain
        let gapWidthMeters = (mapIndex * 50) / 100;
        
        text(`DISTANCE     : ${(globalX/100).toFixed(1)} m`, 25, 75);
        text(`NEXT CHASM   : ~${gapWidthMeters.toFixed(1)} meter wide`, 25, 95);
        
        if (state === 'CLIMB') {
            fill('#f5a623');
            text(`> ENGAGING PARKOUR PROTOCOL`, 25, 120);
            text(`> EXECUTING PULL-UP ${(climbPhase*100).toFixed(0)}%`, 25, 135);
        } else if (state === 'FALL' || state === 'DEAD') {
            fill('#ff003c');
            text(`> GAP TOO WIDE. REACH FAILED.`, 25, 120);
            text(`> FATAL FREEFALL`, 25, 135);
        } else {
            fill('#0070f3');
            text(`> NORMAL LOCOMOTION`, 25, 120);
        }
    }
</script>

</body>
</html>
